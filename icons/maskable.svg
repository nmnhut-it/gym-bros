<?xml version="1.0" encoding="UTF-8"?>
<!--
  Maskable variant — content shrunk into the inner ~80% safe zone so Android's
  adaptive-icon mask (which crops to circle / squircle) does not cut off the flame
  or barbell. Background fills full bleed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="GymBros">
  <title>GymBros</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Inner art at 70% scale, centered -->
  <g transform="translate(76,76)">
    <!-- Rescaled flame inside 360x360 area -->
    <g transform="translate(60,40) scale(10)">
      <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" fill="url(#flame)"/>
    </g>
    <!-- Compact barbell -->
    <g fill="#e5e7eb">
      <rect x="76"  y="280" width="208" height="18" rx="5"/>
      <rect x="48"  y="264" width="32"  height="50" rx="8"/>
      <rect x="280" y="264" width="32"  height="50" rx="8"/>
    </g>
  </g>
</svg>

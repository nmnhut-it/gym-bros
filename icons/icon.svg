<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="GymBros">
  <title>GymBros</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Flame: Lucide-style path scaled to fill upper portion -->
  <g transform="translate(106,56) scale(12.5)">
    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" fill="url(#flame)"/>
  </g>

  <!-- Inner highlight on flame for depth -->
  <g transform="translate(186,180) scale(7)">
    <path d="M12 4c.4 1.6 1.3 3.1 2.5 4.2C15.6 9.2 16 10.3 16 11.5a4 4 0 1 1-8 0c0-.7.2-1.4.6-1.9C9 9 9.5 8.6 10 8c.5-.6.7-1.4.5-2.2C10.7 5.1 11.3 4.3 12 4z" fill="url(#flameInner)" opacity="0.85"/>
  </g>

  <!-- Barbell across the bottom -->
  <g fill="#e5e7eb">
    <rect x="120" y="416" width="272" height="22" rx="6"/>
    <rect x="84"  y="396" width="40"  height="62" rx="10"/>
    <rect x="388" y="396" width="40"  height="62" rx="10"/>
    <rect x="60"  y="412" width="22"  height="30" rx="6"/>
    <rect x="430" y="412" width="22"  height="30" rx="6"/>
  </g>
</svg>
